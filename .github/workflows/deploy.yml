name: Build and Deploy to Azure

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: '10.0.x'
  APP_NAME: 'PoMiniApps'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore PoMiniApps.slnx

      - name: Build solution
        run: dotnet build PoMiniApps.slnx --configuration Release --no-restore

      - name: Publish web app
        run: dotnet publish src/PoMiniApps.Web/PoMiniApps.Web.csproj --configuration Release --no-build --output ./publish_output

      - name: Create deployment zip
        run: |
          cd ./publish_output
          zip -r ../pominiapps.zip .

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.APP_NAME }}
          package: ./pominiapps.zip

      - name: Verify deployment
        run: |
          echo "Deployed to https://pominiapps.azurewebsites.net"
          sleep 30
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pominiapps.azurewebsites.net/health || echo "000")
          echo "Health check HTTP status: $STATUS"
