name: Build and Deploy to Azure

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  APP_NAME: 'PoMiniApps'
  AZURE_RESOURCE_GROUP: 'PoMiniApps'
  AZURE_LOCATION: 'eastus'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore PoMiniApps.slnx

      - name: Build solution
        run: dotnet build PoMiniApps.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: dotnet test tests/PoMiniApps.UnitTests --configuration Release --no-build --verbosity normal

      - name: Publish web app
        run: dotnet publish src/PoMiniApps.Web/PoMiniApps.Web.csproj --configuration Release --output ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pominiapps-app
          path: ./publish

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-test
    environment: production
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: pominiapps-app
          path: ./publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy infrastructure with Bicep
        uses: azure/arm-deploy@v2
        with:
          scope: 'subscription'
          subscriptionId: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          template: './infra/main.bicep'
          parameters: |
            location=${{ env.AZURE_LOCATION }}
            environmentName=prod
            resourceGroupName=${{ env.AZURE_RESOURCE_GROUP }}

      - name: Deploy to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'app-pominiapps'
          package: ./publish

      - name: Health check
        continue-on-error: true
        run: |
          echo "Waiting 60s for app to start..."
          sleep 60
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://app-pominiapps.azurewebsites.net/health)
            echo "Attempt $i - Health check status: $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            sleep 15
          done
          echo "Health check did not return 200 after 3 attempts"
          curl -s https://app-pominiapps.azurewebsites.net/health || true
