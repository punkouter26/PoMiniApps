# Azure Developer CLI (azd) configuration
# Deploy with: azd up

name: pominiapps

metadata:
  template: azd-starter

infra:
  provider: bicep
  path: infra

services:
  web:
    project: ./src/PoMiniApps.Web
    language: dotnet
    host: appservice

azure:
  resourceGroup: rg-PoMiniApps-dev

hooks:
  preprovision:
    shell: pwsh
    run: |
      Write-Host "Using subscription: Punkouter26 (bbb8dfbe-9169-432f-9b7a-fbf861b51037)"
      Write-Host "Resource group: rg-PoMiniApps-dev"
      Write-Host "Shared resources from: PoShared"
